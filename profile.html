<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilim - Crew SMP</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div class="vignette-overlay"></div>
    
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <div class="logo-glow"></div>
                <h1 class="logo-text">CREW SMP</h1>
            </div>
            
            <div class="nav-links" id="navLinks">
                <a href="index.html" class="nav-link">Ana Sayfa</a>
                <a href="channels.html" class="nav-link">Kanallar</a>
                <a href="market.html" class="nav-link">Market</a>
                <a href="tickets.html" class="nav-link">Destek</a>
                <a href="profile.html" class="nav-link nav-cta active">Profilim</a>
            </div>
            
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle" aria-label="Tema Değiştir">
                    <span class="theme-icon">🌙</span>
                </button>
                <button class="hamburger" id="hamburger" aria-label="Menü">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </nav>

    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-avatar" id="profileAvatar">
                <span class="avatar-letter" id="avatarLetter">?</span>
            </div>
            
            <div class="profile-info">
                <h1 class="profile-name" id="profileName">Yükleniyor...</h1>
                <p class="profile-email" id="profileEmail">...</p>
            </div>

            <div class="profile-stats">
                <div class="stat-item">
                    <span class="stat-icon">🎮</span>
                    <span class="stat-label">Durum</span>
                    <span class="stat-value" id="statStatus">Aktif</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">📅</span>
                    <span class="stat-label">Katılım</span>
                    <span class="stat-value" id="statJoined">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">🛡️</span>
                    <span class="stat-label">Üyelik</span>
                    <span class="stat-value">Oyuncu</span>
                </div>
            </div>

            <div class="profile-details">
                <div class="detail-row">
                    <span class="detail-label">E-posta Doğrulama</span>
                    <span class="detail-value" id="emailVerified">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Son Giriş</span>
                    <span class="detail-value" id="lastLogin">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Giriş Yöntemi</span>
                    <span class="detail-value" id="loginMethod">-</span>
                </div>
            </div>

            <div class="profile-actions">
                <a href="tickets.html" class="btn btn-outline">
                    <span class="btn-text">🎯 Destek Taleplerim</span>
                </a>
                <button class="btn btn-danger" id="logoutBtn">
                    <span class="btn-text">🚪 Çıkış Yap</span>
                </button>
            </div>
        </div>
    </div>

    <div class="cookie-banner" id="cookieBanner">
        <div class="cookie-content">
            <p class="cookie-text">
                Bu site Hexages Games güvenlik sistemlerini kullanmaktadır. 
                <a href="cookies.html" class="cookie-link">Çerez politikalarımızı</a> okuyabilirsiniz.
            </p>
            <button class="cookie-btn" onclick="acceptCookies()">Anladım</button>
        </div>
    </div>

    <script type="module" src="profile.js"></script>
    <script src="script.js"></script>
</body>
</html>
