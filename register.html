<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol - Crew SMP</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div class="vignette-overlay"></div>
    
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <div class="logo-glow"></div>
                <h1 class="logo-text">CREW SMP</h1>
            </div>
            
            <div class="nav-links" id="navLinks">
                <a href="index.html" class="nav-link">Ana Sayfa</a>
                <a href="channels.html" class="nav-link">Kanallar</a>
                <a href="haberler.html" class="nav-link">Haberler</a>
                <a href="market.html" class="nav-link">Market</a>
                <a href="tickets.html" class="nav-link">Destek</a>
                <a href="profile.html" class="nav-link">Profil</a>
                <a href="login.html" class="nav-link nav-cta">Giriş Yap</a>
            </div>
            
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle" aria-label="Tema Değiştir">
                    <span class="theme-icon">🌙</span>
                </button>
                <button class="hamburger" id="hamburger" aria-label="Menü">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">Hesap Oluştur</h1>
                <p class="auth-subtitle">Crew SMP ailesine katıl ve maceraya başla</p>
            </div>
            
            <form class="auth-form" id="registerForm">
                <div class="form-group">
                    <label for="username" class="form-label">Kullanıcı Adı</label>
                    <input type="text" id="username" class="form-input" placeholder="OyuncuAdin" required>
                </div>
                
                <div class="form-group">
                    <label for="email" class="form-label">E-posta</label>
                    <input type="email" id="email" class="form-input" placeholder="ornek@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Şifre</label>
                    <input type="password" id="password" class="form-input" placeholder="En az 6 karakter" required>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Şifre Tekrar</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="Şifreni tekrar gir" required>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="terms" required>
                        <span><a href="privacy.html" class="form-link">Kullanım şartlarını</a> kabul ediyorum</span>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full">
                    <span class="btn-text">Kayıt Ol</span>
                    <span class="btn-glow"></span>
                </button>
            </form>
            
            <div class="auth-divider">
                <span>veya</span>
            </div>
            
            <button class="btn btn-google" id="googleRegisterBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <span>Google ile Kayıt Ol</span>
            </button>
            
            <p class="auth-footer">
                Zaten hesabın var mı? <a href="login.html" class="auth-link">Giriş Yap</a>
            </p>
        </div>
    </div>

    <div class="cookie-banner" id="cookieBanner">
        <div class="cookie-content">
            <p class="cookie-text">
                Bu site Hexages Games güvenlik sistemlerini kullanmaktadır. 
                <a href="cookies.html" class="cookie-link">Çerez politikalarımızı</a> okuyabilirsiniz.
            </p>
            <button class="cookie-btn" onclick="acceptCookies()">Anladım</button>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
    <script type="module" src="nav-auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
